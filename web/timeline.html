<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>astral.nvim — semantic diff timeline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1b26;
      color: #c0caf5;
      font-family: "JetBrains Mono", "Fira Code", monospace;
      padding: 2rem;
    }

    header {
      border-bottom: 1px solid #2a2b3d;
      padding-bottom: 1rem;
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 1.2rem;
      color: #7aa2f7;
      margin-bottom: 0.3rem;
    }

    header p {
      font-size: 0.85rem;
      color: #565f89;
    }

    .timeline {
      position: relative;
      padding-left: 2rem;
    }

    .timeline::before {
      content: "";
      position: absolute;
      left: 0.4rem;
      top: 0;
      bottom: 0;
      width: 2px;
      background: #2a2b3d;
    }

    .event {
      position: relative;
      margin-bottom: 1.5rem;
      padding: 1rem;
      border-radius: 8px;
      border: 1px solid #2a2b3d;
      background: #1f2030;
    }

    .event::before {
      content: "";
      position: absolute;
      left: -1.75rem;
      top: 1.2rem;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: currentColor;
    }

    .event.ADDED    { border-left: 3px solid #9ece6a; color: #9ece6a; }
    .event.REMOVED  { border-left: 3px solid #f7768e; color: #f7768e; }
    .event.MODIFIED { border-left: 3px solid #e0af68; color: #e0af68; }

    .event-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.4rem;
    }

    .event-type {
      font-size: 0.7rem;
      font-weight: bold;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      background: currentColor;
      color: #1a1b26;
    }

    .event-name {
      font-size: 0.95rem;
      color: #c0caf5;
    }

    .event-description {
      font-size: 0.8rem;
      color: #565f89;
    }

    .event-line {
      font-size: 0.75rem;
      color: #3b4261;
      margin-top: 0.3rem;
    }

    .empty {
      text-align: center;
      color: #565f89;
      padding: 3rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>⬡ astral.nvim</h1>
    <p id="meta">loading session...</p>
  </header>

  <div class="timeline" id="timeline"></div>

  <script>
    // SESSION_DATA will be replaced by astral when generating this file
    const SESSION = __SESSION_DATA__;

    const meta = document.getElementById("meta");
    const timeline = document.getElementById("timeline");

    if (!SESSION || !SESSION.events || SESSION.events.length === 0) {
      meta.textContent = "no session data found";
      timeline.innerHTML = '<p class="empty">no semantic events to display</p>';
    } else {
      meta.textContent = SESSION.filepath + " — diff against " + SESSION.ref;

      SESSION.events.forEach((event, i) => {
        const div = document.createElement("div");
        div.className = "event " + event.type;
        div.innerHTML = `
          <div class="event-header">
            <span class="event-type">${event.type}</span>
            <span class="event-name">${event.name}</span>
          </div>
          <div class="event-description">${event.description}</div>
          ${event.line > 0 ? `<div class="event-line">line ${event.line}</div>` : ""}
        `;
        timeline.appendChild(div);
      });
    }
  </script>
</body>
</html>
